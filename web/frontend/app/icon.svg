<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Core light point -->
  <circle cx="16" cy="16" r="4" fill="#1a1a1a"/>
  <!-- Radiating rays -->
  <line x1="16" y1="2" x2="16" y2="9" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="16" y1="23" x2="16" y2="30" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="2" y1="16" x2="9" y2="16" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="23" y1="16" x2="30" y2="16" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Diagonal rays (shorter) -->
  <line x1="6.1" y1="6.1" x2="10.6" y2="10.6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="21.4" y1="21.4" x2="25.9" y2="25.9" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="25.9" y1="6.1" x2="21.4" y2="10.6" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="10.6" y1="21.4" x2="6.1" y2="25.9" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
</svg>
